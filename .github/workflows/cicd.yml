name: CI DevSecOps

on:
  push:
    branches: ["dev"]
  pull_request:
    branches: ["dev"]
  workflow_dispatch:

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: nodejs-postgres
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      # --------------------------
      # Checkout
      # --------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --------------------------
      # Node.js setup
      # --------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # --------------------------
      # Build Docker image
      # --------------------------
      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

      # --------------------------
      # Trivy security scans
      # --------------------------
      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.2

      - name: Trivy scan (JSON)
        run: trivy image --no-progress --format json -o trivy-report.json $IMAGE_NAME:${{ github.sha }}

      - name: Trivy scan (HTML)
        run: |
          wget -qO html.tpl https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl
          trivy image --no-progress --format template --template "@html.tpl" -o trivy-report.html $IMAGE_NAME:${{ github.sha }}

      - name: Trivy security gate (CRITICAL)
        run: trivy image --no-progress --severity CRITICAL --exit-code 1 $IMAGE_NAME:${{ github.sha }}

      # --------------------------
      # Snyk scans (if token exists)
      # --------------------------
      - name: Setup Snyk CLI
        if: ${{ env.SNYK_TOKEN != '' }}
        uses: snyk/actions/setup@master

      - name: Snyk scan dependencies
        if: ${{ env.SNYK_TOKEN != '' }}
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}
        run: snyk test --all-projects --json-file-output=snyk-deps.json || true

      - name: Snyk scan container
        if: ${{ env.SNYK_TOKEN != '' }}
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}
        run: snyk container test $IMAGE_NAME:${{ github.sha }} --file=Dockerfile --json-file-output=snyk-container.json || true

      - name: Generate Snyk HTML report
        if: ${{ env.SNYK_TOKEN != '' }}
        run: |
          npm install -g snyk-to-html
          if [ -f snyk-container.json ]; then
            snyk-to-html -i snyk-container.json -o snyk-report.html
          elif [ -f snyk-deps.json ]; then
            snyk-to-html -i snyk-deps.json -o snyk-report.html
          fi

      # --------------------------
      # Scan secrets with Gitleaks
      # --------------------------
      - name: Scan secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --------------------------
      # Upload scan artifacts
      # --------------------------
      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            trivy-report.json
            trivy-report.html
            snyk-deps.json
            snyk-container.json
            snyk-report.html
          if-no-files-found: ignore

      # --------------------------
      # Docker login & push (dev branch only)
      # --------------------------
      - name: Login to Docker Hub
        if: github.ref_name == 'dev'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        if: github.ref_name == 'dev'
        run: |
          docker tag $IMAGE_NAME:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:dev
          docker tag $IMAGE_NAME:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:dev
          docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }}